name: Release

# Releasing = merging a version bump. After CI succeeds on main, this
# workflow checks whether [workspace.package] version already has a tag;
# if not, it tags the CI-tested commit, creates the GitHub release, and
# attaches per-major tarballs.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Decide only: GITHUB_TOKEN may not `git push` tags whose commits touch
  # workflow files, so tag creation happens via the Releases API below.
  check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      released: ${{ steps.check.outputs.released }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Check whether the Cargo.toml version is unreleased
        id: check
        run: |
          set -euo pipefail
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" > /dev/null 2>&1; then
            echo "${tag} already released — nothing to do"
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: check
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      # Draft: the release (and its tag) only go live in the publish job,
      # once every artifact is attached.
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ needs.check.outputs.tag }}"
          --repo "$GITHUB_REPOSITORY"
          --target "${{ github.event.workflow_run.head_sha }}"
          --title "pg_punycode ${{ needs.check.outputs.tag }}"
          --generate-notes
          --draft

  package:
    needs: [check, create-release]
    strategy:
      fail-fast: false
      matrix:
        pg: [13, 14, 15, 16, 17, 18]
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    env:
      LANG: C.UTF-8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      # keys match ci.yml so release jobs reuse the caches CI saves
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-pg${{ matrix.pg }}
      - name: Cache pinned cargo-pgrx
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tools
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.toml') }}
      - name: Cache pgrx-managed PostgreSQL
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pgrx
          key: pgrx-home-${{ runner.os }}-${{ runner.arch }}-pg${{ matrix.pg }}-${{ hashFiles('Cargo.toml') }}
      - name: Install PostgreSQL ${{ matrix.pg }} (pgrx-managed)
        run: >-
          cargo xtask pgrx -- init --pg${{ matrix.pg }} download
          --configure-flag=--without-icu
          --configure-flag=--without-readline
      - name: Package
        working-directory: crates/pg_punycode
        run: >-
          cargo xtask pgrx -- package
          --pg-config "$(echo "$HOME"/.pgrx/${{ matrix.pg }}.*/pgrx-install/bin/pg_config)"
      - name: Stage tarball
        run: |
          set -euo pipefail
          arch="$(dpkg --print-architecture)"
          name="pg_punycode-${{ needs.check.outputs.tag }}-pg${{ matrix.pg }}-linux-${arch}"
          pkgdir="target/release/pg_punycode-pg${{ matrix.pg }}"
          stage="stage/${name}"
          mkdir -p "$stage/lib" "$stage/share/extension"
          find "$pkgdir" -name 'pg_punycode.so' -exec cp {} "$stage/lib/" \;
          find "$pkgdir" -name 'pg_punycode.control' -exec cp {} "$stage/share/extension/" \;
          find "$pkgdir" -name 'pg_punycode--*.sql' -exec cp {} "$stage/share/extension/" \;
          # shellcheck disable=SC2016  # $(pg_config) must stay literal for the reader
          printf 'Copy lib/* into $(pg_config --pkglibdir) and share/extension/* into $(pg_config --sharedir)/extension\n' > "$stage/INSTALL"
          tar -C stage -czf "${name}.tar.gz" "$name"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ needs.check.outputs.tag }}"
          pg_punycode-*.tar.gz pg_punycode-*.tar.gz.sha256
          --repo "$GITHUB_REPOSITORY" --clobber

  publish:
    needs: [check, package]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release (creates the tag)
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release edit "${{ needs.check.outputs.tag }}"
          --repo "$GITHUB_REPOSITORY" --draft=false
