name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache pinned cargo-pgrx
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tools
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.toml') }}
      - name: Cache pgrx-managed PostgreSQL
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pgrx
          key: pgrx-home-${{ runner.os }}-${{ runner.arch }}-pg18-${{ hashFiles('Cargo.toml') }}
      # pgrx-pg-sys's build script needs a registered Postgres even to type-check
      - name: Install PostgreSQL 18 (pgrx-managed)
        run: >-
          cargo xtask pgrx -- init --pg18 download
          --configure-flag=--without-icu
          --configure-flag=--without-readline
      - run: cargo clippy --locked --workspace --all-targets

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [13, 14, 15, 16, 17, 18, 19]
    env:
      LANG: C.UTF-8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: pg${{ matrix.pg }}
      - name: Cache pinned cargo-pgrx
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tools
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.toml') }}
      - name: Cache pgrx-managed PostgreSQL
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pgrx
          key: pgrx-home-${{ runner.os }}-${{ runner.arch }}-pg${{ matrix.pg }}-${{ hashFiles('Cargo.toml') }}
      - name: Install PostgreSQL ${{ matrix.pg }} (pgrx-managed)
        run: >-
          cargo xtask pgrx -- init --pg${{ matrix.pg }} download
          --configure-flag=--without-icu
          --configure-flag=--without-readline
      - name: Test
        run: cargo xtask test pg${{ matrix.pg }}
      - name: Regress
        working-directory: crates/pg_punycode
        run: cargo xtask pgrx -- regress pg${{ matrix.pg }}
